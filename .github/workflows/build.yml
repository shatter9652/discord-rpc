name: Nightly Releases

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build:
    name: Build discord-rpc (VS17.14 / v143)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Print MSVC version
        shell: cmd
        run: |
          cl

      - name: Configure CMake
        shell: cmd
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -T v143 -DBUILD_EXAMPLES=OFF -DBUILD_CLANGFORMAT=OFF

      - name: Build
        shell: cmd
        run: |
          cmake --build build --config Release

      - name: Show built libs
        shell: powershell
        run: |
          Get-ChildItem -Recurse build -Filter *.lib | Select-Object FullName

      - name: Prepare package
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item "build\src\Release\discord-rpc.lib" "release\discord-rpc.lib"
          Copy-Item "include\discord_rpc.h" "release\discord_rpc.h"
          Copy-Item "include\discord_register.h" "release\discord_register.h"

      - name: Create zip
        shell: cmd
        run: |
          7z a -tzip discord-rpc-windows-x64.zip .\release\*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: discord-rpc-windows-x64
          path: release/*

      - name: Update nightly release
        uses: andelf/nightly-release@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: nightly
          name: Nightly discord-rpc Release
          body: |
            Built with Visual Studio 2022 / MSVC v143 14.44.x for x64.
          files: |
            discord-rpc-windows-x64.zip
            release/discord-rpc.lib
            release/discord_rpc.h
            release/discord_register.h
